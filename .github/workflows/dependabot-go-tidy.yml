name: Dependabot Go tidy

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  tidy:
    if: |
      github.actor == 'dependabot[bot]' &&
      !contains(github.event.pull_request.title, 'Run go mod tidy')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.DEPENDABOT_PAT }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Tidy lib module
        working-directory: ./lib
        run: go mod tidy

      - name: Tidy root module
        run: go mod tidy

      - name: Commit tidy changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Run go mod tidy"